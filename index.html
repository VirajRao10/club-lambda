<!doctype html>
<html lang="en" class="dark">
<head>

<body>
  <svg aria-hidden="true" width="0" height="0" class="svg-defs">
    <defs>
      <filter id="liquid-glass" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.014" numOctaves="2" seed="7" result="noise"></feTurbulence>
        <feGaussianBlur in="noise" stdDeviation="2" result="smoothNoise"></feGaussianBlur>
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="18" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
      </filter>
    </defs>
  </svg>

  <header class="top glass">
    <button class="hamburger" type="button" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <a class="brand" href="__CLUB_LAMBDA_BASE__/" aria-label="club lambda home">
      <span>club Λ</span><span aria-hidden="true">◇</span>
    </a>
    <div class="top-actions">
      <button class="gold-button sign-in" type="button">Sign in</button>
      <button class="balance-pill" type="button" title="Balance">
        <span class="coin">Λ</span><span class="nums js-balance">1,000</span><span class="chev">⌄</span>
      </button>
      <div class="balance-menu glass" role="menu" aria-label="Balance menu">
        <p class="menu-copy">Lambda credits persist through Supabase. No deposits, no cashouts.</p>
        <button class="bonus-row js-bonus" type="button">
          <span>Hourly bonus</span><strong class="js-bonus-value">+200</strong>
        </button>
        <p class="bonus-note js-bonus-note"></p>
        <div class="name-box">
          <label for="displayName">Display name</label>
          <div>
            <input id="displayName" class="name-input js-name" maxlength="18" placeholder="Your name...">
            <button class="save-name js-save-name" type="button">Save</button>
          </div>
        </div>
      </div>
      <button class="icon-button js-sound" type="button" aria-label="Mute sound" title="Mute">
        <span class="sound-on">♪</span><span class="sound-off">×</span>
      </button>
    </div>
  </header>

  <aside class="side">
    <div class="glass side-card">
      <nav class="main-nav js-nav"></nav>
      <nav class="meta-nav js-meta-nav"></nav>
      <p class="side-note">Lambda money. Have fun.</p>
    </div>
  </aside>

  <div class="drawer-backdrop"></div>
  <aside class="drawer glass">
    <nav class="drawer-nav js-drawer-nav"></nav>
  </aside>

  <div class="app">
    <main id="view" class="view"></main>
  </div>

  <div class="radio-host js-radio-host"></div>
  <div class="toast js-toast"></div>

  <script src="__CLUB_LAMBDA_BASE__/app.js" type="module"></script>
